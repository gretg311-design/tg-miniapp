<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Moon Project - Железобетон 1.2.1.0 FULL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; -webkit-user-select: none; }
        html, body { background: #05010a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; overscroll-behavior: none; }
        
        #loading { position: fixed; inset: 0; background: #05010a; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .moon-logo { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, #fff, #888); box-shadow: 0 0 35px #fff; animation: pulseMoon 2s infinite ease-in-out; }
        @keyframes pulseMoon { 0% { transform: scale(1); box-shadow: 0 0 30px #fff; } 50% { transform: scale(1.1); box-shadow: 0 0 60px #fff; } 100% { transform: scale(1); box-shadow: 0 0 30px #fff; } }
        
        .legal-text { margin-top: 30px; font-size: 10px; color: #555; text-align: center; max-width: 80%; opacity: 0.8; font-family: monospace; }
        .app-version { font-size: 10px; color: #444; text-align: center; margin-top: 15px; font-family: monospace; }

        /* ОПУСТИЛИ ВСЁ ВНИЗ НА 85px ЧТОБЫ НЕ ПЕРЕКРЫВАЛОСЬ ШАПКОЙ ТГ */
        #app { padding: 85px 20px 40px 20px; display: none; flex-direction: column; height: 100vh; overflow-y: auto; }
        .u-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        @keyframes shimmerNick { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .nick-base { font-size: 22px; font-weight: 900; transition: all 0.3s ease; line-height: 1; }
        .nick-ultra { background: linear-gradient(90deg, #bc42f5, #00bcd4, #bc42f5, #00bcd4); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmerNick 2.5s infinite linear; filter: drop-shadow(0px 0px 8px rgba(188,66,245,0.7)); }
        .nick-vip { background: linear-gradient(90deg, #FFD700, #F5F5DC, #FFAA00, #F5F5DC); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmerNick 3s infinite linear; filter: drop-shadow(0px 0px 6px rgba(255,215,0,0.6)); }
        .nick-pro { color: #00bcd4; text-shadow: 0 0 5px rgba(0,188,212,0.5), 0 0 10px rgba(0,188,212,0.8); letter-spacing: 1px; }
        .nick-premium { background: linear-gradient(90deg, #ff7eb3, #ff758c, #ff7eb3); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmerNick 4s infinite ease-in-out; filter: drop-shadow(0px 0px 5px rgba(255,117,140,0.5)); }
        .nick-free { color: #ffffff; }
        
        .badge-base { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; margin-bottom: 2px; letter-spacing: 1px; text-transform: uppercase; }
        .badge-owner { background: linear-gradient(90deg, #ff0044, #ff0000); color: #fff; box-shadow: 0 0 8px rgba(255,0,0,0.6); border: 1px solid #ffaa88; text-shadow: 0 0 3px #fff; }
        .badge-admin { background: linear-gradient(90deg, #00bcd4, #0055ff); color: #fff; box-shadow: 0 0 8px rgba(0,188,212,0.6); border: 1px solid #88ddff; }
        
        @keyframes smoothOpen { 0% { opacity: 0; transform: translateY(15px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        
        .menu-item, .term-btn, .con-btn, .btn-stars, .btn-ton, .char-card, .chatlist-item, .gender-btn, .task-item button { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), filter 0.1s ease; }
        .menu-item:active, .term-btn:active, .con-btn:active, .btn-stars:active, .btn-ton:active, .char-card:active, .chatlist-item:active, .gender-btn:active, .task-item button:active { transform: scale(0.94); filter: brightness(0.8); }

        .set-list { background: #0d041a; border: 1px solid #2d164d; border-radius: 12px; margin-bottom: 15px; width: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .set-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2d164d; cursor: pointer; transition: transform 0.1s ease, filter 0.1s ease; }
        .set-item:active { transform: scale(0.97); filter: brightness(0.8); }
        .set-item:last-child { border-bottom: none; }
        .set-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-right: 15px; flex-shrink: 0; }
        .set-text { flex: 1; font-size: 15px; color: #fff; font-weight: 500; }
        .set-arrow { color: #555; font-size: 18px; font-weight: bold; }

        .ic-prof { background: #0A84FF; } .ic-lang { background: #30D158; } .ic-ai { background: #8E8E93; } .ic-priv { background: #FF9F0A; } .ic-sup { background: #BF5AF2; } .ic-apk { background: #FF453A; }  

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-item { background: #11081d; border: 1px solid #2d164d; border-radius: 12px; height: 65px; display: flex; align-items: center; justify-content: center; text-transform: uppercase; font-weight: bold; font-size: 10px; color: #fff; cursor: pointer; text-align: center; }
        .btn-adm { border-color: #00bcd4; color: #00bcd4; }
        .btn-con { border-color: #e91e63; color: #e91e63; }

        .overlay { display: none; position: fixed; inset: 0; background: #05010a; z-index: 15000; flex-direction: column; align-items: center; padding: 85px 20px 20px 20px; overflow-y: auto; animation: smoothOpen 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        
        .info-card { width: 100%; background: #0d041a; border: 1px solid #2d164d; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .term-in { background: #000; border: 1px solid #2d164d; border-radius: 8px; padding: 12px; color: #fff; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .term-btn { background: #1a0b2e; border: 1px solid #e91e63; padding: 15px; border-radius: 10px; text-align: center; width: 100%; color: #fff; text-transform: uppercase; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        
        .con-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 20px; }
        .con-btn { border: 1px solid #e91e63; background: rgba(233, 30, 99, 0.05); border-radius: 10px; height: 60px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; text-transform: uppercase; font-weight: bold; cursor: pointer; text-align: center; }

        /* 🔥 ДОБАВЛЕНО: СТИЛИ ДЛЯ MARKDOWN (ЗВЕЗДОЧКИ, АБЗАЦЫ, ЖИРНЫЙ) */
        .md-content p { margin: 0 0 5px 0; }
        .md-content p:last-child { margin: 0; }
        .md-content em { color: #bc42f5; font-style: italic; opacity: 0.9; } /* Звездочки ролплея станут фиолетовыми */
        .md-content strong { color: #fff; font-weight: bold; }
        .md-content ul, .md-content ol { margin: 0; padding-left: 20px; }
        .md-content a { color: #00bcd4; text-decoration: none; }
    <div id="p-chat" class="overlay" style="padding: 0;">
        <div style="width: 100%; background: #0d041a; padding: 85px 15px 15px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d164d;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img id="chat-header-avatar" src="" style="width: 36px; height: 36px; border-radius: 50%; border: 1px solid #bc42f5; object-fit: cover;">
                <div style="font-weight: bold; color: #bc42f5; font-size: 18px;" id="chat-char-name">Имя Персонажа</div>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="font-weight: bold; color: #fff; font-size: 16px;">🌙 <span id="chat-shards-balance">0</span></div>
                <div style="color: #888; font-size: 28px; cursor: pointer; padding: 0 5px; line-height: 1;" onclick="closeChat()">×</div>
            </div>
        </div>
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages-box"></div>
            <div class="chat-input-area">
                <textarea id="chat-input-text" class="chat-input" placeholder="Ваше сообщение..." rows="1" style="height: 40px;" oninput="this.style.height = '40px'; this.style.height = (this.scrollHeight) + 'px';"></textarea>
                <button id="chat-send-btn" class="chat-send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <div id="p-user-chars" class="overlay">
        <h2 style="color:#bc42f5; margin-bottom: 20px;" data-i18n="h_chars">ПЕРСОНАЖИ</h2>
        
        <div class="tabs-wrap">
            <div class="tab-btn active" id="tab-char-off" onclick="switchCharTab('official')">Официальные</div>
            <div class="tab-btn" id="tab-char-cus" onclick="switchCharTab('custom')">Пользовательские</div>
            <div class="tab-btn" id="tab-char-exc" onclick="switchCharTab('exclusive')">Эксклюзивные</div>
        </div>

        <div id="official-tools" style="width:100%; margin-bottom:15px; display:block;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="char-search" class="term-in" placeholder="Поиск по имени..." style="margin-bottom:0; flex:1;" oninput="renderUserChars(false)">
            </div>
            <div class="info-card" style="padding:10px; margin-bottom:0;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-size:10px; color:#888; font-weight:bold;">ПОЛ:</span>
                    <div style="display:flex; gap:10px;">
                        <span id="f-g-all" style="font-size:10px; color:#bc42f5; font-weight:bold; cursor:pointer;" onclick="setOffFilter('gender','all')">ВСЕ</span>
                        <span id="f-g-m" style="font-size:10px; color:#555; cursor:pointer;" onclick="setOffFilter('gender','m')">МУЖ</span>
                        <span id="f-g-f" style="font-size:10px; color:#555; cursor:pointer;" onclick="setOffFilter('gender','f')">ЖЕН</span>
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:10px; color:#888; font-weight:bold;">КАТЕГОРИЯ:</span>
                    <div style="display:flex; gap:10px;">
                        <span id="f-c-all" style="font-size:10px; color:#bc42f5; font-weight:bold; cursor:pointer;" onclick="setOffFilter('cat','all')">ВСЕ</span>
                        <span id="f-c-anime" style="font-size:10px; color:#555; cursor:pointer;" onclick="setOffFilter('cat','anime')">АНИМЕ</span>
                        <span id="f-c-games" style="font-size:10px; color:#555; cursor:pointer;" onclick="setOffFilter('cat','games')">ИГРЫ</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="custom-filters" style="display:none; background:#11081d; border:1px solid #2d164d; border-radius:8px; padding:12px; margin-bottom:15px; width:100%;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
                <span style="font-size:11px; color:#888; text-transform:uppercase; font-weight:bold;">Пол:</span>
                <div style="display:flex; gap:10px;">
                    <span id="filt-g-all" style="font-size:11px; color:#bc42f5; cursor:pointer; font-weight:bold; transition:0.2s;" onclick="setCustomFilter('gender', 'all')">Все</span>
                    <span id="filt-g-m" style="font-size:11px; color:#555; cursor:pointer; transition:0.2s;" onclick="setCustomFilter('gender', 'm')">Мужские</span>
                    <span id="filt-g-f" style="font-size:11px; color:#555; cursor:pointer; transition:0.2s;" onclick="setCustomFilter('gender', 'f')">Женские</span>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:11px; color:#888; text-transform:uppercase; font-weight:bold;">Сортировка:</span>
                <div style="display:flex; gap:10px;">
                    <span id="filt-s-new" style="font-size:11px; color:#bc42f5; cursor:pointer; font-weight:bold; transition:0.2s;" onclick="setCustomFilter('sort', 'new')">Новые</span>
                    <span id="filt-s-pop" style="font-size:11px; color:#555; cursor:pointer; transition:0.2s;" onclick="setCustomFilter('sort', 'pop')">Популярные</span>
                </div>
            </div>
        </div>

        <div id="user-char-list" class="char-grid"></div>
        <div class="term-btn" style="margin-top: 20px;" onclick="back()" data-i18n="b_back">НАЗАД</div>
    </div>

    <div id="p-char-dossier" class="overlay">
        <h2 style="color:#bc42f5; margin-bottom: 10px;" id="dos-name">Имя</h2>
        <div class="info-card">
            <div id="dos-badge" class="status-badge" style="display:none;"></div>

            <img id="dos-img" src="" class="dossier-img">
            <div class="p-row"><span class="p-label" data-i18n="dos_age">Возраст:</span> <span class="p-val" id="dos-age">18</span></div>
            <div class="p-row"><span class="p-label" data-i18n="dos_gender">Пол:</span> <span class="p-val" id="dos-gender">М</span></div>
            <div class="md-content" style="margin-top:15px; font-size:12px; color:#ccc; line-height:1.4;" id="dos-desc">Описание...</div>
        </div>
        
        <div id="dos-chat-btn" class="term-btn" style="border-color:#00ff00" onclick="openChatFromDossier()" data-i18n="b_start_chat">НАЧАТЬ ЧАТ</div>
        
        <div id="dos-unlock-btn" class="term-btn" style="border-color:gold; background:rgba(255,215,0,0.1); color:gold; display:none;">🔓 ОТКРЫТЬ ДОСТУП ЗА 10 ⭐️</div>

        <div id="dos-pub-btn" class="term-btn" style="border-color:#f39c12; display:none;" onclick="publishMyChar()">ДОБАВИТЬ К ГЛАВНЫМ</div>

        <div id="dos-del-btn" class="term-btn" style="border-color:#ff4444; display:none;" onclick="deleteChar()" data-i18n="b_del_char">УДАЛИТЬ ПЕРСОНАЖА</div>
        <div class="term-btn" onclick="back()" data-i18n="b_back">НАЗАД</div>
    </div>
    
    <div id="p-daily" class="overlay">
        <h2 style="color:#00ff00; margin-bottom: 5px;" data-i18n="h_daily">ЕЖЕДНЕВНАЯ НАГРАДА</h2>
        <div style="font-size: 11px; color: #888; margin-bottom: 20px; text-align:center;" data-i18n="d_sub">Награда зависит от подписки. Заходи 7 дней подряд для бонуса x2!</div>
        <div class="info-card" style="text-align: center; display: flex; flex-direction: column; align-items: center;">
            <div style="font-size: 50px; margin-bottom: 10px;">🎁</div>
            <h3 id="daily-streak-text" style="color: #bc42f5; margin: 0 0 10px 0;">Стрик: 0 дней</h3>
            <div style="font-size: 14px; margin-bottom: 15px; color:#aaa;">
                <span data-i18n="d_today">Ваша награда сегодня:</span><br>
                <b id="daily-reward-text" style="color: #00ff00; font-size: 24px;">...</b>
            </div>
            <div id="daily-btn" class="term-btn" style="border-color:#00ff00; background:rgba(0,255,0,0.1); color:#00ff00; width:80%;" onclick="claimDaily()" data-i18n="b_claim">ЗАБРАТЬ</div>
            <div id="daily-wait" style="display:none; color:#888; font-size: 12px; margin-top: 10px;">Следующая награда будет доступна завтра.</div>
        </div>
        <div class="term-btn" onclick="back()" data-i18n="b_back">НАЗАД</div>
    </div>
    
    <div id="p-user-tasks" class="overlay">
        <h2 style="color:#00ff00; margin-bottom: 20px;" data-i18n="h_tasks">ЗАДАНИЯ</h2>
        <div class="info-card" style="text-align: center; border-color: #bc42f5;">
            <h3 style="color:#bc42f5; margin-top:0; margin-bottom:5px;" data-i18n="t_invite">ПРИГЛАСИ ДРУГА</h3>
            <div style="font-size:12px; color:#aaa; margin-bottom:10px;"><span data-i18n="t_invite_desc">Ты и твой друг получите по</span> <b style="color:#00ff00">100 🌙</b>!</div>
            <div class="term-btn" style="border-color:#bc42f5; background:rgba(188,66,245,0.1); color:#fff; font-size:12px; padding:10px;" onclick="shareRef()" data-i18n="b_share">ПОДЕЛИТЬСЯ ССЫЛКОЙ</div>
        </div>
        <div id="user-task-list" style="width:100%"></div>
        <div class="term-btn" style="margin-top: 20px;" onclick="back()" data-i18n="b_back">НАЗАД</div>
    </div>
    <div id="p-m-subs" class="overlay">
        <h2 style="color:#00bcd4">ПОДПИСКИ (30д)</h2>
        <div class="info-card">
            <input type="number" id="isu-id" class="term-in" placeholder="TG ID">
            <select id="isu-type" class="term-in">
                <option value="Premium">Premium</option><option value="Pro">Pro</option><option value="VIP">VIP</option><option value="Ultra">Ultra</option>
            </select>
            <div class="term-btn" style="border-color:#00ff00" onclick="modFunds('sub','add')">ВЫДАТЬ</div>
            <div id="own-su-rem" class="term-btn" style="border-color:#ff4444; display:none;" onclick="modFunds('sub','rem')">АННУЛИРОВАТЬ</div>
        </div>
        <div class="term-btn" onclick="back()">НАЗАД</div>
    </div>
    
    <div id="p-m-prices" class="overlay">
        <h2 style="color:#e91e63">УПРАВЛЕНИЕ ЦЕНАМИ</h2>
        <div class="info-card">
            <h4 style="margin:0 0 10px 0; color:#00bcd4">ОСКОЛКИ</h4>
            <input type="number" id="pr-sh-stars" class="term-in" placeholder="Цена Stars">
            <input type="number" id="pr-sh-ton" class="term-in" placeholder="Цена TON">
            <div class="term-btn" style="border-color:#00ff00" onclick="savePrices('shards')">СОХРАНИТЬ ЦЕНУ ОСКОЛКОВ</div>
        </div>
        <div class="info-card">
            <h4 style="margin:0 0 10px 0; color:#bc42f5">ПОДПИСКИ (30д)</h4>
            <input type="number" id="pr-sub-stars" class="term-in" placeholder="Цена Stars">
            <input type="number" id="pr-sub-ton" class="term-in" placeholder="Цена TON">
            <div class="term-btn" style="border-color:#00ff00" onclick="savePrices('subs')">СОХРАНИТЬ ЦЕНУ ПОДПИСОК</div>
        </div>
        <div class="term-btn" onclick="back()">НАЗАД</div>
    </div>
    
    <div id="p-m-char" class="overlay">
        <h2 style="color:#00bcd4">ПЕРСОНАЖ</h2>
        <div class="info-card" style="text-align: center;">
            <img id="char-preview" src="#">
            <input type="text" id="ich-name" class="term-in" placeholder="Имя">
            <input type="number" id="ich-age" class="term-in" placeholder="Возраст (18+)" min="18">
            
            <span class="s-label" style="text-align: center;">Категория</span>
            <select id="ich-category" class="term-in" style="text-align: center;">
                <option value="anime">Аниме</option>
                <option value="games">Игры</option>
                <option value="other">Другое</option>
            </select>

            <span class="s-label" style="text-align: center;">Пол персонажа</span>
            <div class="gender-box">
                <div class="gender-btn active" id="cg-m" onclick="setCharGender('m')">Мужской</div>
                <div class="gender-btn" id="cg-f" onclick="setCharGender('f')">Женский</div>
            </div>
            <textarea id="ich-desc" class="term-in char-desc" style="height: 120px; resize: none;" placeholder="Описание..." maxlength="2000" oninput="updateCharCounter()"></textarea>
            <div id="char-limit" class="char-counter">0/2000</div>
            <input type="file" id="char-file" accept="image/*" style="display:none;" onchange="previewImg(this)">
            <div class="term-btn" style="border-color:#00bcd4" onclick="document.getElementById('char-file').click()">ВЫБРАТЬ ИЗ ГАЛЕРЕИ</div>
            <div class="term-btn" style="border-color:#bc42f5" onclick="saveCharDB()">В БАЗУ</div>
        </div>
        <div class="term-btn" onclick="back()">НАЗАД</div>
    </div>
    
    <div id="p-m-tasks" class="overlay">
        <h2 style="color:#00bcd4">ЗАДАНИЯ</h2>
        <div class="info-card">
            <input type="text" id="it-name" class="term-in" placeholder="Название">
            <input type="text" id="it-link" class="term-in" placeholder="Ссылка (https://...)">
            <select id="it-rtype" class="term-in" onchange="toggleTaskInput()">
                <option value="shards">Осколки</option><option value="sub7">Подписка (7 дней)</option>
            </select>
            <input type="number" id="it-rew" class="term-in" placeholder="Кол-во осколков">
            <div class="term-btn" style="border-color:#00ff00" onclick="modTask('add')">ДОБАВИТЬ ЗАДАНИЕ</div>
        </div>
        <div id="task-list" style="width:100%"></div>
        <div class="term-btn" onclick="back()">НАЗАД</div>
    </div>
    
    <div id="p-m-promos" class="overlay">
        <h2 style="color:#00bcd4">ПРОМОКОДЫ</h2>
        <div class="info-card">
            <input type="text" id="ip-code" class="term-in" placeholder="КОД">

        async function uploadToCloud(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = async function() {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        
                        try {
                            const res = await fetch(API_URL + '/api/upload', {
                                method: 'POST', headers: getAuthHeaders(),
                                body: JSON.stringify({ image: compressedBase64 })
                            });
                            const data = await res.json();
                            if (data.url) resolve(data.url);
                            else resolve(null);
                        } catch (err) { resolve(null); }
                    };
                    img.onerror = () => resolve(null);
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

            }
            chatObjects.sort((a, b) => { if (a.isPinned && !b.isPinned) return -1; if (!a.isPinned && b.isPinned) return 1; return a.orderIndex - b.orderIndex; });
            
            if(chatObjects.length === 0) { list.innerHTML = `<div class='info-card' style='text-align:center; color:#888;'>У вас пока нет активных диалогов. Перейдите в Персонажи!</div>`; } 
            else { 
                const chatCards = await Promise.all(chatObjects.map(async (obj) => { 
                    let pinMark = obj.isPinned ? `<span class="pin-icon">📌</span>` : ""; 
                    let pinText = obj.isPinned ? "Открепить" : "Закрепить"; 
                    let tName = await neuroTranslate(obj.char.name, currentLang); 
                    return `<div class="chatlist-item" id="chat-item-${obj.id}" onclick="resumeChat(${obj.id})" style="z-index:1;"><img src="${obj.char.photo}" class="chatlist-img"><div class="chatlist-info"><div class="chatlist-name">${pinMark}${tName}</div><div class="chatlist-last">${obj.lastMsg.replace(/<[^>]*>?/gm, '')}</div></div><button class="chat-menu-btn" onclick="toggleChatMenu(${obj.id}, event)">⋮</button><div class="chat-dropdown" id="chat-dd-${obj.id}"><div class="chat-dropdown-item" onclick="pinChatAction(${obj.id}, event)">📌 ${pinText}</div><div class="chat-dropdown-item" style="color:orange;" onclick="clearChatAction(${obj.id}, event)">🧹 Очистить</div><div class="chat-dropdown-item" style="color:#ff4444;" onclick="deleteChatAction(${obj.id}, event)">🗑 Удалить</div></div></div>`; 
                })); 
                list.innerHTML = chatCards.join(''); 
            } 
            openPanel('p-user-chatlist');
        }

        async function resumeChat(charId) { if(isBotTyping) return; activeCharId = charId; const c = allChars.find(x => x.id == charId); if(!c) return; document.getElementById('chat-char-name').innerText = await neuroTranslate(c.name, currentLang); document.getElementById('chat-header-avatar').src = c.photo; renderChatMessages(); openPanel('p-chat'); }
        
        async function openChatFromDossier() { 
            if(isBotTyping) return; 
            const c = allChars.find(x => x.id === activeCharId); if(!c) return; 
            
            if (c.char_type === 'exclusive' && getUid() !== OID && c.creator_id != getUid()) {
                if (!userData.unlocked_chars || !userData.unlocked_chars.includes(c.id)) {
                    return tg.showAlert("Сначала разблокируйте доступ за 10 Stars!");
                }
            }

            document.getElementById('chat-char-name').innerText = await neuroTranslate(c.name, currentLang); 
            document.getElementById('chat-header-avatar').src = c.photo; 
            const uid = getUid(); 
            let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); 
            if(!allChats[activeCharId]) { allChats[activeCharId] = []; localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); updateChatOrder(activeCharId); } 
            renderChatMessages(); 
            openPanel('p-chat'); 
        }

        function renderChatMessages() {
            const uid = getUid(); let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); let msgs = allChats[activeCharId] || []; const chatBox = document.getElementById('chat-messages-box');
            let uAvatar = localStorage.getItem('m_avatar_' + uid) || "https://i.ibb.co/4pDNDk1/avatar.png"; const char = allChars.find(c => c.id == activeCharId); let cAvatar = char ? char.photo : "";
            let lastCharIdx = -1; for(let i = msgs.length - 1; i >= 0; i--) { if(msgs[i].sender === 'char') { lastCharIdx = i; break; } }
            if(msgs.length === 0) { chatBox.innerHTML = `<div style="text-align:center; color:#555; font-size:12px; margin-top: 20px;">Начните диалог...<br>1 сообщение = 1 🌙</div>`; } 
            else { chatBox.innerHTML = msgs.map((m, index) => {
                    if (m.sender === 'user') { return `<div class="chat-msg-row user-row"><div class="msg-user-wrapper"><div class="msg-box msg-user md-content">${renderMD(m.text)}</div></div><img src="${uAvatar}" class="msg-avatar"></div>`; } 
                    else {
                        let stats = m.stats || {love: 10, trust: 15, inf: 5, horny: 0}; let actionBar = '';
                        if (index === lastCharIdx) { actionBar = `<div class="msg-bottom-bar"><div class="msg-stats">💖 ${stats.love}% 🛡️ ${stats.trust}% ✨ ${stats.inf}% 💦 ${stats.horny}%</div><div class="msg-actions"><span onclick="actionReroll(${index})">🔄</span><span onclick="actionNext()">⏭️</span><span onclick="actionPhoto(${index})">🖼️</span><span onclick="actionCircle(${index})">⭕</span></div></div>`; }
                        return `<div class="chat-msg-row char-row"><img src="${cAvatar}" class="msg-avatar"><div class="msg-bot-wrapper" style="width: 100%;"><div class="msg-box msg-char md-content">${renderMD(m.text)}</div>${actionBar}</div></div>`;
                    }
                }).join(''); 
            } setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 50);
        }

        async function actionPhoto(index) {
            const uid = getUid(); 
            let sub = (userData.subscription || "FREE").trim().toUpperCase();
            let cost = (sub === 'FREE') ? 5 : 2;
            
            if(uid !== OID && userData.shards < cost) return tg.showAlert(`❌ Нужно ${cost} 🌙!`);
            if(uid !== OID) updateBalanceUI(userData.shards - cost);
            
            let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}");
            let msgText = allChats[activeCharId][index].text.replace(/<[^>]*>?/gm, ''); 

            const loadId = "load-ph-" + Date.now();
            allChats[activeCharId][index].text += `<div id="${loadId}" style="color:#ffaa00; font-size:12px; margin-top:10px; font-weight:bold;">⏳ ИИ рисует фото...</div>`;
            localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats));
            renderChatMessages();
            
            try {
                const res = await fetch(API_URL + '/api/generate-media', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ char_id: activeCharId, message_text: msgText, type: 'photo' }) });
                const data = await res.json();
                
                allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}");
                allChats[activeCharId][index].text = allChats[activeCharId][index].text.replace(`<div id="${loadId}" style="color:#ffaa00; font-size:12px; margin-top:10px; font-weight:bold;">⏳ ИИ рисует фото...</div>`, '');

                if(data.url) {
                    allChats[activeCharId][index].text += `<br><br><img src="${data.url}" style="width:100%; border-radius:10px; margin-top:5px; border:1px solid #bc42f5;">`;
                    localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
                } else { 
                    localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
                    if(uid !== OID) updateBalanceUI(userData.shards + cost); tg.showAlert("❌ Ошибка: " + (data.error || "Не удалось сгенерировать")); 
                }
            } catch(e) { 
                allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}");
                allChats[activeCharId][index].text = allChats[activeCharId][index].text.replace(`<div id="${loadId}" style="color:#ffaa00; font-size:12px; margin-top:10px; font-weight:bold;">⏳ ИИ рисует фото...</div>`, '');
                localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
                if(uid !== OID) updateBalanceUI(userData.shards + cost); tg.showAlert("❌ Ошибка связи с сервером!"); 
            }
        }

        async function actionCircle(index) {
            const uid = getUid(); let sub = (userData.subscription || "FREE").trim().toUpperCase();
            if(sub === 'FREE' && uid !== OID) return tg.showAlert("❌ Кружок доступен только платникам!");
            if(uid !== OID && userData.shards < 5) return tg.showAlert(`❌ Нужно 5 🌙!`);
            if(uid !== OID) updateBalanceUI(userData.shards - 5);
            
            let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}");
            let msgText = allChats[activeCharId][index].text.replace(/<[^>]*>?/gm, '');

            const loadId = "load-cr-" + Date.now();
            allChats[activeCharId][index].text += `<div id="${loadId}" style="color:#ffaa00; font-size:12px; margin-top:10px; font-weight:bold;">⏳ ИИ создает кружок...</div>`;
            localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
            
            try {
                const res = await fetch(API_URL + '/api/generate-media', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ char_id: activeCharId, message_text: msgText, type: 'circle' }) });
                const data = await res.json();
                
                allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}");
                allChats[activeCharId][index].text = allChats[activeCharId][index].text.replace(`<div id="${loadId}" style="color:#ffaa00; font-size:12px; margin-top:10px; font-weight:bold;">⏳ ИИ создает кружок...</div>`, '');

                if(data.url) {
                    allChats[activeCharId][index].text += `<br><br><div style="width:120px; height:120px; border-radius:50%; background:#bc42f5 url('${data.url}') center/cover; border:3px solid #bc42f5; margin:10px auto; box-shadow: 0 0 10px #bc42f5; animation: pulseMoon 2s infinite;"></div>`;
                    localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
                } else { 
                    localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
                    if(uid !== OID) updateBalanceUI(userData.shards + 5); tg.showAlert("❌ Ошибка: " + (data.error || "Не удалось сгенерировать")); 
                }
            } catch(e) { 
                allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}");
                allChats[activeCharId][index].text = allChats[activeCharId][index].text.replace(`<div id="${loadId}" style="color:#ffaa00; font-size:12px; margin-top:10px; font-weight:bold;">⏳ ИИ создает кружок...</div>`, '');
                localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages();
                if(uid !== OID) updateBalanceUI(userData.shards + 5); tg.showAlert("❌ Ошибка связи с сервером!"); 
            }
        }

        async function actionReroll(index) {
            if(isBotTyping) return;
            const uid = getUid(); if(uid !== OID && userData.shards < 1) return tg.showAlert("Нужен 1 🌙!");
            let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); let msgs = allChats[activeCharId]; if(!msgs || !msgs[index]) return;
            if(uid !== OID) updateBalanceUI(userData.shards - 1);
            msgs.splice(index); localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); renderChatMessages(); triggerBotResponse(uid, allChats, "(Перепиши свой последний ответ по-другому)");
        }

        async function actionNext() {
            if(isBotTyping) return;
            const uid = getUid(); if(uid !== OID && userData.shards < 1) return tg.showAlert("Нужен 1 🌙!");
            if(uid !== OID) updateBalanceUI(userData.shards - 1);
            let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); if(!allChats[activeCharId]) allChats[activeCharId] = []; triggerBotResponse(uid, allChats, "(Продолжай свой рассказ дальше)");
        }

        async function triggerBotResponse(uid, allChats, forcedText = null) {
            isBotTyping = true; const input = document.getElementById('chat-input-text'); const sendBtn = document.getElementById('chat-send-btn');
            if(input) { input.disabled = true; sendBtn.disabled = true; input.value = ''; input.style.height = '40px'; }
            let minTimePassed = false; setTimeout(() => { minTimePassed = true; }, 4000); 
            const chatBox = document.getElementById('chat-messages-box'); const char = allChars.find(c => c.id == activeCharId); let cAvatar = char ? char.photo : ""; const typeId = "typing-" + Date.now();
            chatBox.innerHTML += `<div class="chat-msg-row char-row" id="${typeId}" style="opacity:0.5;"><img src="${cAvatar}" class="msg-avatar"><div class="msg-bot-wrapper" style="width: 100%;"><div class="msg-box msg-char">Персонаж печатает...</div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            try {
                const uName = document.getElementById('u-name').innerText; const rawGender = localStorage.getItem('m_gender_' + uid) || 'm'; let uGender = rawGender === 'f' ? (currentLang === 'en' ? "Female" : "Женский") : (currentLang === 'en' ? "Male" : "Мужской"); const lenSet = parseInt(localStorage.getItem('m_len_' + uid) || 25); const sexSet = parseInt(localStorage.getItem('m_sex_' + uid) || 0);
                const res = await fetch(API_URL + '/api/chat', { method: 'POST', headers: getAuthHeaders(), body: JSON.stringify({ char_id: activeCharId, message: forcedText || "", chat_history: allChats[activeCharId], len: lenSet, sex: sexSet, user_name: uName, user_gender: uGender, lang: currentLang }) });
                const data = await res.json(); 
                if (data.reply) { 
                    const replyRow = document.getElementById(typeId); replyRow.style.opacity = "1"; const replyBox = replyRow.querySelector('.msg-box'); 
                    replyBox.innerHTML = ""; 
                    let replyText = data.reply; 
                    
                    // Выводим отформатированный текст без эффекта печатной машинки, чтобы не сломать теги
                    replyBox.classList.add('md-content');
                    replyBox.innerHTML = renderMD(replyText);
                    chatBox.scrollTop = chatBox.scrollHeight;
                    finishMessage(replyText, data.new_balance);
                    
                    function finishMessage(finalText, newBal) { let waitTimer = setInterval(() => { if (minTimePassed) { clearInterval(waitTimer); let stats = { love: Math.floor(Math.random() * 40) + 10, trust: Math.floor(Math.random() * 40) + 10, inf: Math.floor(Math.random() * 30) + 5, horny: sexSet > 0 ? Math.floor(Math.random() * 50) + (sexSet * 5) : 0 }; allChats[activeCharId].push({sender: 'char', text: finalText, stats: stats}); localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); if (uid !== OID && newBal !== undefined) updateBalanceUI(newBal); renderChatMessages(); unlockChat(); } }, 500); }
                } else { document.getElementById(typeId)?.remove(); if (data.error) { tg.showAlert(data.error); if(data.error === "locked_exclusive") back(); } unlockChat(); }
            } catch (e) { document.getElementById(typeId)?.remove(); tg.showAlert("Ошибка сервера"); unlockChat(); }
            function unlockChat() { isBotTyping = false; if(input) { input.disabled = false; sendBtn.disabled = false; setTimeout(() => { input.focus(); }, 100); } }
        }

        async function sendMessage() {
            if(isBotTyping) return; const input = document.getElementById('chat-input-text'); const text = input.value.trim(); if(!text) return;
            const uid = getUid(); if(uid !== OID && userData.shards < 1) return tg.showAlert("Недостаточно осколков!");
            let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); if(!allChats[activeCharId]) allChats[activeCharId] = [];
            allChats[activeCharId].push({sender: 'user', text: text}); localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats));
            updateChatOrder(activeCharId); renderChatMessages(); triggerBotResponse(uid, allChats, text);
        }

        function updateChatOrder(charId) { const uid = getUid(); let order = JSON.parse(localStorage.getItem('m_chat_order_' + uid) || "[]"); order = order.filter(id => id != charId); order.unshift(charId); localStorage.setItem('m_chat_order_' + uid, JSON.stringify(order)); }
        function toggleChatMenu(charId, e) { if(e) e.stopPropagation(); if(openDropdownId !== null && openDropdownId !== charId) { let old = document.getElementById('chat-dd-' + openDropdownId); if(old) old.style.display = 'none'; let oldItem = document.getElementById('chat-item-' + openDropdownId); if(oldItem) oldItem.style.zIndex = 1; } let el = document.getElementById('chat-dd-' + charId); let chatItem = document.getElementById('chat-item-' + charId); if(el.style.display === 'flex') { el.style.display = 'none'; if(chatItem) chatItem.style.zIndex = 1; openDropdownId = null; } else { el.style.display = 'flex'; if(chatItem) chatItem.style.zIndex = 1000; openDropdownId = charId; } }
        function pinChatAction(charId, e) { if(e) e.stopPropagation(); const uid = getUid(); let pinned = JSON.parse(localStorage.getItem('m_pinned_chats_' + uid) || "[]"); if(pinned.includes(charId)) { pinned = pinned.filter(id => id != charId); tg.showAlert("Откреплено"); } else { pinned.push(charId); tg.showAlert("Закреплено 📌"); } localStorage.setItem('m_pinned_chats_' + uid, JSON.stringify(pinned)); if(openDropdownId !== null) { let el = document.getElementById('chat-dd-' + openDropdownId); if(el) el.style.display = 'none'; openDropdownId = null; } openChatList(); }
        function clearChatAction(charId, e) { if(e) e.stopPropagation(); tg.showConfirm("Очистить память?", (yes) => { if(yes) { const uid = getUid(); let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); allChats[charId] = []; localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); if(openDropdownId !== null) { let el = document.getElementById('chat-dd-' + openDropdownId); if(el) el.style.display = 'none'; openDropdownId = null; } openChatList(); tg.showAlert("Очищено 🧹"); } }); }
        function deleteChatAction(charId, e) { if(e) e.stopPropagation(); tg.showConfirm("Удалить чат?", (yes) => { if(yes) { const uid = getUid(); let allChats = JSON.parse(localStorage.getItem('m_chats_' + uid) || "{}"); delete allChats[charId]; localStorage.setItem('m_chats_' + uid, JSON.stringify(allChats)); let pinned = JSON.parse(localStorage.getItem('m_pinned_chats_' + uid) || "[]"); pinned = pinned.filter(id => id != charId); localStorage.setItem('m_pinned_chats_' + uid, JSON.stringify(pinned)); let order = JSON.parse(localStorage.getItem('m_chat_order_' + uid) || "[]"); order = order.filter(id => id != charId); localStorage.setItem('m_chat_order_' + uid, JSON.stringify(order)); if(openDropdownId !== null) { let el = document.getElementById('chat-dd-' + openDropdownId); if(el) el.style.display = 'none'; openDropdownId = null; } openChatList(); } }); }
        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ (ФИНАЛ) ---

        function renderMD(text) {
            if (!text) return "";
            let html = text
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") // Экранирование
                .replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>') // Жирный курсив
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')             // Жирный
                .replace(/\*(.*?)\*/g, '<i>$1</i>')               // Курсив
                .replace(/__(.*?)__/g, '<u>$1</u>')               // Подчеркнутый
                .replace(/`(.*?)`/g, '<code>$1</code>')           // Код
                .replace(/\n/g, '<br>');                          // Переносы строк

            // Обработка списков (простая)
            html = html.replace(/^\s*[-*+]\s+(.*)$/gm, '<li>$1</li>');
            if (html.includes('<li>')) {
                html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
            }
            
            return html;
        }

        function getDeclension(n, forms) {
            let pr = Math.abs(n) % 100; let n1 = pr % 10;
            if (pr > 10 && pr < 20) return forms[2];
            if (n1 > 1 && n1 < 5) return forms[1];
            if (n1 == 1) return forms[0];
            return forms[2];
        }

        // --- ИНИЦИАЛИЗАЦИЯ ИНПУТОВ ---

        const chatInput = document.getElementById('chat-input-text');
        if (chatInput) {
            chatInput.addEventListener('input', function() {
                this.style.height = '40px';
                let newH = Math.min(this.scrollHeight, 120);
                this.style.height = newH + 'px';
            });

            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        // Закрытие выпадающих меню при клике вне их
        document.addEventListener('click', () => {
            if (openDropdownId !== null) {
                let el = document.getElementById('chat-dd-' + openDropdownId);
                if (el) el.style.display = 'none';
                let item = document.getElementById('chat-item-' + openDropdownId);
                if (item) item.style.zIndex = 1;
                openDropdownId = null;
            }
        });

        // Запуск приложения
        initApp();

    </script>
